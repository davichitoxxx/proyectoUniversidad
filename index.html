<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cacao Amargo — Chocolate de origen</title>
    <meta name="description" content="Cacao amargo de origen, tostado y elaborado en pequeños lotes." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,500;9..144,600;9..144,700&family=Work+Sans:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <div id="google_translate_element" style="display:none"></div>
    <script type="text/javascript">
      function googleTranslateElementInit() {
        new google.translate.TranslateElement(
          { pageLanguage: 'es', includedLanguages: 'en,es', autoDisplay: false },
          'google_translate_element'
        )
      }
    </script>
    <script
      type="text/javascript"
      src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"
    ></script>
    <script>
      const removeGoogleBanner = () => {
        document.body.style.top = '0px'
        const banner = document.querySelector('.goog-te-banner-frame')
        if (banner) banner.remove()
      }
      new MutationObserver(removeGoogleBanner).observe(document.body, {
        attributes: true,
        attributeFilter: ['style'],
      })
      setInterval(removeGoogleBanner, 500)
    </script>
  </body>
</html>
